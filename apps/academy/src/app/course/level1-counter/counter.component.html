<div class="counter-container">
  <div class="card">
    <h1 class="title">Test-Driven Learning 🚀</h1>
    <p class="subtitle">Angular Signals</p>
    
    <div class="stats-grid">
      <div class="stat-box" data-learning-anchor="counter-value">
        <span class="stat-label">Writable Signal (counter)</span>
        <!-- TODO: Challenge 1 - When counter is a signal, call it as a function: counter() -->
        <span class="stat-value highlight">{{ counter }}</span>
      </div>
      <div class="stat-box" data-learning-anchor="double-value">
        <span class="stat-label">Computed Signal (doubleCounter)</span>
        <!-- TODO: Challenge 3 - When doubleCounter is a computed signal, call it as a function: doubleCounter() -->
        <span class="stat-value secondary">{{ doubleCounter }}</span>
      </div>
    </div>

    <div class="input-info" data-learning-anchor="step-input">
      <span class="badge">Signal Input (step)</span>
      <!-- TODO: Challenge 2 - When step is an input signal, call it as a function: step() -->
      <p>Increment Value: <strong>{{ step }}</strong></p>
    </div>

    <div class="button-group">
      <!-- TODO: Challenge 2 - Remember to update the button text to step() -->
      <button class="btn btn-primary" (click)="increment()">Increment (+{{ step }})</button>
      <button class="btn btn-outline" (click)="decrement()">Decrement (-{{ step }})</button>
    </div>
  </div>
</div>
